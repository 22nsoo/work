<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    반복문 for(초기값; 조건; 증가값)<br>
    <script>
        let a = 1;
        for(a = 1; a < 5; a+=1){
            document.write("a값은 " + a + "<br>");
        }
        document.write("for 블럭 수행 후 a 값은 " + a + "<br>");
        document.write("<br>");
        for(let a = 5; a >= 1; a--){
            document.write("a값은 " + a + "<br>");
        }
        
        document.write("<br>");
        for(let a = 3; a <= 11; a++){
            document.write("a값은 " + a + "<br>");
        }
        document.write("<br>");
        document.write("<br>");
        document.write("다중 for <br>");
        for(let i = 1; i <= 3; i++){
            document.write("i값은 => " + i + "&nbsp;&nbsp;")
            for(let j = 1; j <= 4; j++){
                document.write("j : " + j + "&nbsp;&nbsp;")
            }
            document.write("<br>")
        }

        let hap;
        let i;
        let j;
        document.write("<br><br>1부터 10까지의 합 <br>");
        hap = 0;
        for(let su = 1 ; su <= 10; su ++){
            hap += su;
        }
        document.write("수의 합은 " + hap + "<br><br>");

        document.write("<br><br>1부터 100까지 정수중 2의 배수이나 5의 배수가 아닌 수의 합 출력 <br>");
        hap = 0;
        for(i = 1; i<=100; i++){
            if(i%2 ===0 && i%5!==0) hap += i;
            //==는 느슨한 동등 비교로 타입을 자동 변환하여 값만 비교하고,
            //===는 엄격한 일치 비교로 값과 데이터 타입이 모두 같아야 true를 반환
        }
        document.write("정답은 " + hap + "<br><br>");

        document.write("구구단 출력 -table에 <br><br>");
        document.write("<table border = '1'>");
        for(i = 2 ; i<=9; i ++){
            document.write("<tr>");
            for(j = 1; j<=9; j++){
                // document.write("<td>");
                // document.write(i + " x " + j +" = " + i*j);
                // document.write("</td>");
                document.write(`<td>${i}*${j}=${i*j}&nbsp;&nbsp;</td>`)
            }
            document.write("</tr");
        }
        document.write("</table>")
    </script>
</body>
</html>
